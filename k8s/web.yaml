apiVersion: apps/v1
kind: Deployment
metadata:
  name: adodash-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adodash-web
  template:
    metadata:
      labels:
        app: adodash-web
    spec:
      containers:
        - name: web
          image: adodash-web:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: adodash-web
spec:
  selector:
    app: adodash-web
  ports:
    - name: http
      port: 80
      targetPort: 80

