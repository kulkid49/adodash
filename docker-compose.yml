services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: adodash
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adodash?schema=public
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      ENCRYPTION_KEY_BASE64: ${ENCRYPTION_KEY_BASE64}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID}
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
      VITE_AZURE_AD_TENANT_ID: ${VITE_AZURE_AD_TENANT_ID}
      VITE_AZURE_AD_CLIENT_ID: ${VITE_AZURE_AD_CLIENT_ID}
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
